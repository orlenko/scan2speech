<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Scan2Speech — OCR Lab</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; margin-top: 14px; }
    .lab-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
    .lab-card h3 { margin: 0 0 4px; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
    .lab-meta { font-size: 0.75em; color: var(--muted); margin-bottom: 6px; }
    .lab-card textarea { width: 100%; min-height: 280px; resize: vertical; font: 13px/1.5 ui-monospace, monospace; white-space: pre-wrap; }
    .lab-card.err { border-color: var(--bad); }
    .lab-card .errmsg { color: var(--bad); font-size: 0.85em; }
    .lab-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .lab-controls label { display: flex; flex-direction: column; gap: 4px; font-size: 0.88em; color: var(--muted); }
    .lab-controls label.full { grid-column: 1 / -1; }
    .thumb-lab { max-width: 160px; max-height: 220px; border-radius: 8px; border: 1px solid var(--line); }
    .pill { font-size: 0.7em; padding: 1px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
    @media (max-width: 560px) { .lab-controls { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="wrap">
      <h1>🔬 OCR Lab</h1>
      <p class="tagline">Compare OCR engines &amp; models side by side, and tune the reconciliation prompt. <a href="index.html">← back to app</a></p>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <p id="keyStatus" class="status"></p>

      <div class="lab-controls">
        <label>Page language hint
          <input id="lang" type="text" spellcheck="false" placeholder="e.g. Ukrainian or uk" />
        </label>
        <label>Max image dimension (px)
          <input id="maxDim" type="number" min="768" max="4096" step="128" value="1568" />
        </label>
        <label>Slices (horizontal bands)
          <select id="slices">
            <option value="1">1 — whole page</option>
            <option value="2">2 bands</option>
            <option value="3">3 bands</option>
            <option value="4">4 bands</option>
          </select>
        </label>
        <label class="full">OpenAI vision models to run (comma-separated)
          <input id="models" type="text" spellcheck="false" value="gpt-4o, gpt-4.1, gpt-5.5" />
        </label>
        <label class="full"><span><input id="deskew" type="checkbox" /> Straighten (deskew) before slicing — detects the text-line angle, no dependency</span></label>
        <label class="full"><span><input id="useGoogle" type="checkbox" checked /> Run Google Cloud Vision</span></label>
      </div>

      <div class="row" style="margin-top:12px">
        <input id="file" type="file" accept="image/*" />
        <img id="thumb" class="thumb-lab" hidden alt="page" />
      </div>
      <div class="row">
        <button id="runOcr" type="button" disabled>Run OCR (all engines)</button>
        <span id="ocrStatus" class="status push-right"></span>
      </div>
    </section>

    <section>
      <h2 class="sec-title">Raw engine outputs</h2>
      <p class="muted small">Each box is editable — fix a source by hand if you want, then feed it to reconcile below.</p>
      <div id="ocrResults" class="lab-grid"></div>
    </section>

    <section class="card" style="margin-top:20px">
      <h2>Reconcile</h2>
      <div class="lab-controls">
        <label>Source A (authority for words)
          <select id="srcA"></select>
        </label>
        <label>Source B (authority for order)
          <select id="srcB"></select>
        </label>
        <label>Reconcile model
          <input id="recModel" type="text" spellcheck="false" value="gpt-4o" />
        </label>
        <label>&nbsp;
          <button id="runReconcile" type="button" disabled>Run reconcile</button>
        </label>
        <label class="full">Reconcile system prompt (editable — tune it live)
          <textarea id="recPrompt" style="min-height:200px; font:13px/1.5 ui-monospace, monospace;"></textarea>
        </label>
      </div>
      <span id="recStatus" class="status"></span>
      <div id="reconcileResult" class="lab-grid"></div>
    </section>

    <div style="height:40px"></div>
  </main>

  <script src="compare.js"></script>
</body>
</html>
